<!DOCTYPE html>
<html>
<head>
    <title>Verity Family Food Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: sans-serif; background: #f4f4f4; }
        #map { height: 100vh; width: 100vw; }
        .food-popup h3 { margin: 0 0 5px; color: #b52c1e; border-bottom: 1px solid #eee; }
        .food-item { margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px dashed #ccc; }
        .food-item:last-child { border-bottom: none; }
        .map-link { color: #b52c1e; text-decoration: none; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <script>
        const map = L.map('map').setView([20, 0], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

const verityRed = '#b52c1e';

// 1. Load World Borders First
fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
    .then(response => response.json())
    .then(worldData => {
        
        // 2. Load Spreadsheet Data
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                
                // 3. STRICT FILTER: Create a list of countries that have a valid Date
                const validEatenCountries = data
                    .filter(row => row.Country && row.Date && row.Date.trim() !== "")
                    .map(row => row.Country.trim());

                // 4. COLOR THE COUNTRIES (Only if in our valid list)
                L.geoJson(worldData, {
                    style: function(feature) {
                        let countryName = feature.properties.name;
                        let shouldColor = validEatenCountries.includes(countryName);
                        
                        return {
                            fillColor: shouldColor ? verityRed : 'transparent',
                            weight: shouldColor ? 1 : 0.5,
                            opacity: 1,
                            color: shouldColor ? 'white' : '#ddd',
                            fillOpacity: shouldColor ? 0.5 : 0 // 0 means invisible/not colored
                        };
                    }
                }).addTo(map);

                // 5. PLACE ICONS AT GEOGRAPHICAL CENTERS
                const groupedByCountry = {};
                data.forEach(row => {
                    if (row.Country && row.Date && row.Date.trim() !== "") {
                        if (!groupedByCountry[row.Country]) groupedByCountry[row.Country] = [];
                        groupedByCountry[row.Country].push(row);
                    }
                });

                Object.keys(groupedByCountry).forEach(countryName => {
                    const feature = worldData.features.find(f => f.properties.name === countryName);
                    
                    if (feature) {
                        // Use Leaflet's internal bounds to find the center of the country shape
                        const layer = L.geoJson(feature);
                        const center = layer.getBounds().getCenter();

                        let popupHtml = `<div class="food-popup"><h3>${countryName}</h3>`;
                        groupedByCountry[countryName].forEach(item => {
                            popupHtml += `
                                <div class="food-item">
                                    <p><b>${item.Restaurant}</b> (${item.Date})</p>
                                    <p>${item.Location}</p>
                                    <a href="${item['Google Maps']}" target="_blank" class="map-link">Google Maps →</a>
                                </div>`;
                        });
                        popupHtml += `</div>`;

                        L.marker(center, {icon: foodIcon})
                         .bindPopup(popupHtml)
                         .addTo(map);
                    }
                });
            }
        });
    });
    </script>
</body>
</html>
